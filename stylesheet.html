<style>
:root {
  --background-color: #1a202c;
  --container-bg-color: #2d3748;
  --card-bg-color: #4a5568;
  --primary-color: #63b3ed;
  --secondary-color: #f6e05e;
  --danger-color: #e53e3e;
  --text-color: #e2e8f0;
  --text-muted-color: #a0aec0;
  --border-color: #4a5568;
}

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background-color: var(--background-color);
  color: var(--text-color);
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start; /* 上寄せに変更 */
  min-height: 100vh;
  box-sizing: border-box;
}

.container {
  background-color: var(--container-bg-color);
  padding: 20px 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
  width: 100%;
  max-width: 600px;
  text-align: center;
  border: 1px solid var(--border-color);
}
.phase-section.hidden {
  display: none;
}

h1, h2, h3 {
  margin-top: 0;
  font-weight: 700;
}

h1 {
  font-size: 2.5em;
  color: var(--danger-color);
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}
h2 {
  font-size: 1.8em;
  color: var(--primary-color);
  border-bottom: 2px solid var(--border-color);
  padding-bottom: 10px;
  margin-bottom: 20px;
}
h3 {
  font-size: 1.4em;
  color: var(--text-muted-color);
}

p, label {
  font-size: 1.1em;
  line-height: 1.6;
}

.btn {
  display: inline-block;
  width: 80%;
  max-width: 300px;
  padding: 15px 20px;
  font-size: 1.2em;
  font-weight: 700;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px 0;
  transition: all 0.2s ease-in-out;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}
.btn:active {
  transform: translateY(1px);
}
.btn-primary { background-color: var(--primary-color); }
.btn-primary:hover { background-color: #4299e1; }
.btn-secondary { background-color: var(--secondary-color); color: #1a202c; }
.btn-secondary:hover { background-color: #ecc94b; }

.form-group {
  margin-bottom: 20px;
  text-align: left;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 700;
  color: var(--text-muted-color);
}
input[type="text"], select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 1.1em;
  box-sizing: border-box;
  background-color: var(--background-color);
  color: var(--text-color);
}

.player-list, .result-list {
  list-style: none; padding: 0; margin: 20px 0;
}
.player-list li, .result-list li {
  background-color: var(--card-bg-color);
  padding: 12px 18px;
  border-radius: 8px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 1.1em;
}
.result-list .player-role {
  font-weight: bold;
  color: var(--secondary-color);
}

.vote-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 15px;
  margin-top: 20px;
}
.vote-btn {
  width: 100%;
  padding: 20px 10px;
  font-size: 1.1em;
  font-weight: bold;
  background-color: #5a67d8;
}
.vote-btn:hover { background-color: #4c51bf; }

.role-card {
  background-color: rgba(0,0,0,0.2);
  border: 2px dashed var(--primary-color);
  padding: 20px;
  border-radius: 12px;
  margin: 20px auto;
}
.role-card img {
  max-width: 150px;
  height: auto;
  margin-bottom: 15px;
  border-radius: 50%;
  border: 3px solid var(--secondary-color);
}
.role-card h3 {
  font-size: 2em;
  color: var(--secondary-color);
}
.role-card .role-description {
  font-size: 1em;
  text-align: left;
  margin-top: 15px;
  color: var(--text-color);
}

/* ★改善点: 占い師の情報と人狼の仲間情報を同じスタイルにするため、汎用的なクラス名に変更 */
.role-additional-info {
  background-color: rgba(99, 179, 237, 0.2);
  border: 1px solid var(--primary-color);
  padding: 10px;
  border-radius: 8px;
  margin-top: 15px;
  font-size: 0.9em;
  text-align: left; /* 文字を左寄せに */
}

.message-box {
  background-color: rgba(0,0,0,0.2);
  border-left: 5px solid var(--primary-color);
  padding: 15px 20px;
  border-radius: 8px;
  margin: 20px 0;
  text-align: left;
}
.winner-box {
  border-color: var(--secondary-color);
  text-align: center;
}
.winner-box h3 {
  color: var(--secondary-color);
  font-size: 1.8em;
}
.exiled-box {
  border-color: var(--danger-color);
}

.timer {
  font-size: 3em;
  font-weight: bold;
  color: var(--danger-color);
  margin: 20px 0;
}

.auto-transition-message {
   padding: 20px;
   font-size: 1.2em;
   color: var(--text-muted-color);
   font-style: italic;
}

.loading-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
  display: flex; justify-content: center; align-items: center;
  z-index: 9999;
}
.loading-overlay.hidden { display: none; }
.spinner {
  border: 5px solid var(--border-color);
  border-top: 5px solid var(--primary-color);
  border-radius: 50%;
  width: 50px; height: 50px;
  animation: spin 1s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
